<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Park Su-yong | AI Software Student & Developer Portfolio">
    <title>Park Su-yong | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070') no-repeat center center;
            background-size: cover;
            filter: grayscale(100%) brightness(40%);
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 150%);
            z-index: -1;
        }

        .header {
            display: flex;
            justify-content: flex-start;
            gap: 80px;
            padding: 40px 60px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .description, .contact {
            opacity: 0.7;
            line-height: 1.6;
        }

        .logo { font-weight: 900; }

        .main-content {
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 60px;
            padding-bottom: 100px;
            position: relative;
        }

        .info-list {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sub-info {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .sub-info a {
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
        }

        .sub-info a:hover { opacity: 1; color: #eaff96; }

        .hero-title {
            font-size: 7.5rem;
            line-height: 0.85;
            text-align: left;
            letter-spacing: -5px;
            font-weight: 900;
        }

        .highlight {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
            color: transparent;
        }

        .floating-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(15px);
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo {
            font-weight: 900;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            color: #fff;
            margin-right: 10px;
            padding-left: 10px;
        }

        .nav-item {
            display: inline-block;
            background: none;
            border: none;
            color: #777;
            padding: 10px 22px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-item:hover { color: #fff; }

        .nav-item.active {
            color: #fff;
            position: relative;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 22px;
            right: 22px;
            height: 1px;
            background: #fff;
        }

        .nav-item.yellow {
            background: #eaff96;
            color: #000;
            border-radius: 10px;
            font-weight: 800;
        }

        .nav-item.yellow:hover {
            background: #d4f060;
            color: #000;
        }

        .nav-item.home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: background 0.3s, border-color 0.3s;
        }

        .nav-item.home:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
        }

        .nav-item.home i {
            font-size: 0.8rem;
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }
        
        @media (max-width: 1024px) {
            .hero-title { font-size: 5rem; letter-spacing: -2px; }
            .header { gap: 40px; }
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 3.5rem; letter-spacing: -1px; }
            .header { flex-direction: column; gap: 20px; padding: 30px; }
            .main-content { padding-left: 30px; }
            .floating-nav { width: 90%; overflow-x: auto; }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="background-image"></div>

    <header class="header">
        <div class="logo">[DEV.LOG]</div>
        <div class="description">
            AI Software Student.<br>
            Exploring C, Java, and Linux.
        </div>
        <div class="contact">
            hello@suyong.dev<br>
            EST. 2026
        </div>
    </header>

    <main class="main-content">
        <div class="info-list">
            <div class="sub-info">AI Software Dept.</div>
            <div class="sub-info">Semicolon Club Member</div>
            <div class="sub-info">
                <a href="https://github.com/psy0635-ctrl" target="_blank">
                    <i class="fab fa-github"></i> github.com/psy0635-ctrl
                </a>
            </div>
        </div>

        <h1 class="hero-title">
            HELLO, I'M <span class="highlight">PARK</span><br>
            <span class="highlight">SU-YONG</span><br>
            STUDENT & DEVELOPER
        </h1>
    </main>

    <nav class="floating-nav">
        <div class="nav-container">
            <span class="nav-logo">[DEV.LOG]</span>

            <a href="#" class="nav-item active" onclick="event.preventDefault()">Info</a>
            <a href="#" class="nav-item" onclick="event.preventDefault()">Projects</a>
            <a href="#" class="nav-item" onclick="event.preventDefault()">Stacks</a>

            <div class="nav-divider"></div>
            <a href="index.html" class="nav-item home">
                <i class="fas fa-arrow-left"></i> 홈으로
            </a>

            <a href="https://github.com/psy0635-ctrl" target="_blank" class="nav-item yellow">Visit GitHub</a>
        </div>
    </nav>
</body>
</html>

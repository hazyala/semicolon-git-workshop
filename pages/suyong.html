<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박수용 | 프로필</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* 페이지 전체 테마 (다크 모드 기준) */
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }
        .profile-container 
/* style.css 또는 <style> 태그 안 */
.profile-container {
    max-width: 600px;
    width: 100%;
    /* 1. 배경을 미세한 그라데이션으로 변경 */
    background: linear-gradient(145deg, #2d2d2d, #252525);
    /* 2. 테두리를 살짝 넣어서 더 깔끔하게 */
    border: 1px solid #3d3d3d;
    border-radius: 15px;
    padding: 30px;
    /* 3. 그림자를 더 부드럽고 깊게 */
    box-shadow: 10px 10px 30px #1a1a1a, -10px -10px 30px #262626;
    /* 4. 등장할 때 스윽 나타나는 애니메이션 (옵션) */
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
       /* 헤더 전체 레이아웃 (가로 정렬) */
.profile-header {
    display: flex;
    align-items: center;
    gap: 30px; 
    text-align: left; 
    border-bottom: 1px solid #444;
    padding-bottom: 30px;
    margin-bottom: 30px;
    /* 아까 만든 fadeIn 애니메이션 적용 */
    animation: fadeIn 0.8s ease-in-out;
}

/* 이미지 동그란 박스 */
.profile-pic-wrapper {
    flex-shrink: 0;
    width: 120px;
    height: 120px;
    background: #3a3a3a;
    border-radius: 50%;
    border: 3px solid #007aff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* 텍스트 영역 */
.profile-info {
    flex: 1;
}
        .name {
            font-size: 2rem;
            margin: 10px 0;
            color: #ff4500; /* 강조색 */
        }
        .role {
            color: #86868b;
            font-size: 1.1rem;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #007aff;
            margin-bottom: 10px;
            border-left: 4px solid #007aff;
            padding-left: 10px;
        }
        .skill-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            background: #444;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .profile-img {
    width: 100%;      /* 부모 박스 너비에 맞춤 */
    height: 100%;     /* 부모 박스 높이에 맞춤 */
    object-fit: cover; /* 사진 비율이 깨지지 않게 꽉 채움 */
}
        .tag:hover {
    background: #007aff; /* 배경색 파란색으로 */
    color: white; /* 글자색 흰색으로 */
    
    /* 3. 살짝 위로 띄우고 그림자 넣기 */
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0, 122, 255, 0.4);
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #86868b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<div class="header profile-header">
    <div class="profile-pic-wrapper">
        <div class="profile-pic-wrapper">
    <img src="D:\semicolon-git-workshop\images\박수용_증명사진.jpg" alt="박수용 프로필" class="profile-img">
</div>
    </div>

    <div class="profile-info">
        <div class="name">박수용</div>
        <div class="role">예비 개발자 | Semicolon Member</div>
        <p class="bio">
            꾸준히 성장하며 효율적인 코드를 고민하는 개발자 지망생입니다.
        </p>
    </div>
</div>

    <div class="section">
        <div class="section-title">기술 스택 (Tech Stacks)</div>
        <div class="skill-tags">
            <span class="tag">C / C#</span>
            <span class="tag">Java</span>
            <span class="tag">HTML/CSS</span>
            <span class="tag">Linux</span>
            <span class="tag">Git & GitHub</span>
        </div>
    </div>

    <div class="section">
        <div class="section-title">관심 분야</div>
        <ul style="list-style: none; padding: 0; color: #ddd;">
            <li>🚀 시스템 프로그래밍 및 리눅스 관리</li>
            <li>💻 C#을 활용한 윈도우 애플리케이션 개발</li>
            <li>🛠 오픈소스 프로젝트 협업</li>
        </ul>
    </div>

    <div class="section">
        <div class="section-title">Contact</div>
        <p style="color: #ddd;">GitHub: <a href="#" style="color: #007aff; text-decoration: none;">@suyong-park</a></p>
    </div>

    <a href="index.html" class="back-btn">← 메인 페이지로 돌아가기</a>
</div>

</body>
</html>
